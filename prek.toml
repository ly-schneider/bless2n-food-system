default_install_hook_types = ["pre-commit", "commit-msg"]
exclude = "^bfs-android-app/"

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-yaml", args = ["--allow-multiple-documents"], exclude = "pnpm-lock\\.yaml$" },
  { id = "check-toml" },
  { id = "check-merge-conflict" },
  { id = "check-added-large-files", args = ["--maxkb=500"] },
]

[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v4.2.0"
hooks = [
  { id = "conventional-pre-commit", stages = ["commit-msg"], args = ["feat", "fix", "chore", "docs", "style", "refactor", "perf", "test", "build", "ci", "revert"] },
]
