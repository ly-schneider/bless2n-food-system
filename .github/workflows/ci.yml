name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
      backend: ${{ steps.filter.outputs.backend }}
      docs: ${{ steps.filter.outputs.docs }}
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            web:
              - 'bfs-web-app/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            backend:
              - 'bfs-backend/**'
              - 'go.mod'
              - 'go.sum'
            docs:
              - 'bfs-docs/**'
            terraform:
              - 'bfs-cloud/**'
              - '*.tf'

  ci-web:
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    uses: ./.github/workflows/ci-web.yml

  ci-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    uses: ./.github/workflows/ci-backend.yml

  docs-quality:
    name: Docs Quality Checks
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-node-pnpm
        with:
          working-directory: bfs-docs

      - name: Lint
        working-directory: bfs-docs
        run: pnpm run lint

      - name: Build
        working-directory: bfs-docs
        run: pnpm run build

  terraform-quality:
    name: Terraform Quality
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.terraform == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: 1.13.3

      - name: Format check
        working-directory: bfs-cloud
        run: terraform fmt -check -recursive

      - name: Validate staging
        working-directory: bfs-cloud/envs/staging
        run: |
          terraform init -upgrade -backend=false
          terraform validate

      - name: Validate production
        working-directory: bfs-cloud/envs/production
        run: |
          terraform init -upgrade -backend=false
          terraform validate

  ci-gate:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - ci-web
      - ci-backend
      - docs-quality
      - terraform-quality
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.ci-web.result }}" == "failure" ]] || \
             [[ "${{ needs.ci-backend.result }}" == "failure" ]] || \
             [[ "${{ needs.docs-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.terraform-quality.result }}" == "failure" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi

          echo "All required jobs passed or were skipped"
