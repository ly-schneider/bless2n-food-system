name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: "Force build and deploy even when semantic-release finds no new version"
        type: boolean
        default: false

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
      git_ref: ${{ steps.resolve.outputs.git_ref }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      app_version: ${{ steps.resolve.outputs.app_version }}
      revision_suffix: ${{ steps.resolve.outputs.revision_suffix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - id: semrel
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve deploy metadata
        id: resolve
        env:
          PUBLISHED: ${{ steps.semrel.outputs.new_release_published }}
          NEW_TAG: ${{ steps.semrel.outputs.new_release_git_tag }}
          NEW_VERSION: ${{ steps.semrel.outputs.new_release_version }}
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail
          compute_suffix() {
            local tag="$1"
            local sha="$2"
            local safe
            safe=$(echo "$tag" | tr '.' '-')
            echo "${safe}-${sha:0:8}"
          }

          if [[ "$PUBLISHED" == "true" ]]; then
            IMAGE_TAG="$NEW_VERSION"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "git_ref=$NEW_TAG" >> "$GITHUB_OUTPUT"
            echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
            echo "app_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "revision_suffix=$(compute_suffix "$IMAGE_TAG" "$GITHUB_SHA")" >> "$GITHUB_OUTPUT"
          elif [[ "$FORCE" == "true" ]]; then
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            LATEST_VERSION="${LATEST_TAG#v}"
            SHORT_SHA="${GITHUB_SHA:0:7}"
            IMAGE_TAG="${LATEST_VERSION}-forced-${SHORT_SHA}"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "git_ref=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
            echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
            echo "app_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
            echo "revision_suffix=$(compute_suffix "$IMAGE_TAG" "$GITHUB_SHA")" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: [release]
    if: needs.release.outputs.should_deploy == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release.outputs.git_ref }}

      - uses: ./.github/actions/docker-build-push
        with:
          context: ./bfs-web-app
          dockerfile: ./bfs-web-app/Dockerfile
          image-name: frontend
          image-tag: ${{ needs.release.outputs.image_tag }}
          env-tag: staging
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          build-args: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ vars.SENTRY_ORG }}
            SENTRY_PROJECT=${{ vars.SENTRY_PROJECT_FRONTEND }}
            CI=true
            APP_VERSION=${{ needs.release.outputs.app_version }}

  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: [release]
    if: needs.release.outputs.should_deploy == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release.outputs.git_ref }}

      - uses: ./.github/actions/setup-go-env
      - uses: ./.github/actions/generate-backend

      - uses: ./.github/actions/docker-build-push
        with:
          context: ./bfs-backend
          dockerfile: ./bfs-backend/Dockerfile.ci
          image-name: backend
          image-tag: ${{ needs.release.outputs.image_tag }}
          env-tag: staging
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  build-docs:
    name: Build Docs Image
    runs-on: ubuntu-latest
    needs: [release]
    if: needs.release.outputs.should_deploy == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release.outputs.git_ref }}

      - uses: ./.github/actions/docker-build-push
        with:
          context: ./bfs-docs
          dockerfile: ./bfs-docs/Dockerfile
          image-name: docs
          image-tag: ${{ needs.release.outputs.image_tag }}
          env-tag: staging
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    environment: staging
    needs: [release, build-frontend, build-backend, build-docs]
    if: needs.release.outputs.should_deploy == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release.outputs.git_ref }}

      - name: Install PostgreSQL client
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Provision database roles
        working-directory: bfs-backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_ADMIN_URL }}
        run: ./db/provisioning/provision.sh

      - name: Install Atlas CLI
        uses: ariga/setup-atlas@2f3c785c89a15e1c0d07bcae3900fb5feb969eea # v0.3
        with:
          version: v0.38.0

      - name: Apply Atlas migrations
        working-directory: bfs-backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_ATLAS_URL }}
        run: atlas migrate apply --env deploy

  deploy:
    name: Deploy Staging
    runs-on: ubuntu-latest
    environment: staging
    needs: [release, migrate]
    if: needs.release.outputs.should_deploy == 'true'
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.git_ref }}

      - name: Terraform Cloud apply
        uses: kvrhdn/tfe-run@4953a73eaf2b24b7fc7c2a98bc8d112eea1b34c7 # v1.0.9
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ${{ vars.TF_ORG_NAME }}
          workspace: ${{ vars.TF_WORKSPACE }}
          message: "Deploy | env=staging | v${{ needs.release.outputs.image_tag }}"
          wait-for-completion: true
          tf-vars: |
            image_tag       = "${{ needs.release.outputs.image_tag }}"
            revision_suffix = "${{ needs.release.outputs.revision_suffix }}"
            ghcr_token      = "${{ secrets.GHCR_TOKEN }}"

  sentry-release:
    name: Create Sentry Release
    runs-on: ubuntu-latest
    environment: staging
    needs: [release, build-frontend, build-backend]
    if: needs.release.outputs.should_deploy == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release.outputs.git_ref }}
          fetch-depth: 0

      - uses: getsentry/action-release@5657c9e888b4e2cc85f4d29143ea4131fde4a73a # v3.6.0
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
        with:
          release: ${{ needs.release.outputs.image_tag }}
          environment: staging
          projects: ${{ vars.SENTRY_PROJECT_FRONTEND }} ${{ vars.SENTRY_PROJECT_BACKEND }}
          ignore_missing: true
