name: Android Release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to build for"
        required: true
        type: choice
        options:
          - staging
          - production
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: true
        type: string

jobs:
  quality-checks:
    name: Android Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: false

      - name: Lint
        working-directory: bfs-android-app
        run: ./gradlew lint --parallel

      - name: Run tests
        working-directory: bfs-android-app
        run: ./gradlew test --parallel

      - name: Assemble debug
        working-directory: bfs-android-app
        run: ./gradlew assembleDebug --parallel

  build-and-release:
    name: Build & Release Android APK
    runs-on: ubuntu-latest
    needs: quality-checks
    environment: ${{ inputs.environment }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: false

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo -n "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"
          echo "BFS_UPLOAD_STORE_FILE=$RUNNER_TEMP/upload-keystore.jks" >> "$GITHUB_ENV"

      - name: Validate version format
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must be in format X.Y.Z (e.g., 1.0.0)"
            exit 1
          fi

          # Calculate version code (major * 10000 + minor * 100 + patch)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          echo "version_name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"

      - name: Build Android release APK
        working-directory: bfs-android-app
        env:
          VERSION_TAG: ${{ inputs.version }}
          SUMUP_AFFILIATE_KEY: ${{ secrets.SUMUP_AFFILIATE_KEY }}
          POS_URL: ${{ secrets.POS_URL }}
          ORG_GRADLE_PROJECT_sumupAffiliateKey: ${{ secrets.SUMUP_AFFILIATE_KEY }}
          ORG_GRADLE_PROJECT_posUrl: ${{ secrets.POS_URL }}
          ORG_GRADLE_PROJECT_bfsEnv: ${{ inputs.environment }}
          BFS_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BFS_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          BFS_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
          UPDATE_CHECK_URL: ${{ vars.UPDATE_CHECK_URL }}
        run: |
          # Build the appropriate variant based on environment
          if [ "${{ inputs.environment }}" == "staging" ]; then
            ./gradlew clean assembleStaging
          else
            ./gradlew clean assembleRelease
          fi

      - name: Rename APK with environment
        run: |
          # Navigate to the correct output directory based on build type
          if [ "${{ inputs.environment }}" == "staging" ]; then
            cd bfs-android-app/app/build/outputs/apk/staging
          else
            cd bfs-android-app/app/build/outputs/apk/release
          fi

          for apk in *.apk; do
            mv "$apk" "bfs-pos.apk"
          done
          sha256sum bfs-pos.apk > bfs-pos.apk.sha256

      - name: Create and publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: android-${{ inputs.environment }}-v${{ inputs.version }}
          TITLE: Android POS - ${{ inputs.environment }} v${{ inputs.version }}
          ENVIRONMENT: ${{ inputs.environment }}
          VERSION: ${{ inputs.version }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          BUILT_AT: ${{ steps.version.outputs.date }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          IS_PRERELEASE: ${{ inputs.environment == 'staging' }}
        run: |
          set -euo pipefail

          if [ "$ENVIRONMENT" = "staging" ]; then
            APK_DIR="bfs-android-app/app/build/outputs/apk/staging"
          else
            APK_DIR="bfs-android-app/app/build/outputs/apk/release"
          fi

          NOTES=$(cat <<EOF
          ## Android POS Release

          **Environment:** $ENVIRONMENT
          **Version:** $VERSION (build $VERSION_CODE)
          **Built:** $BUILT_AT
          **Branch:** $BRANCH
          **Commit:** $COMMIT_SHA

          ---

          Download the APK below and install on your tablets.
          EOF
          )

          # Create as draft so assets can be attached on immutable-release repos
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TITLE" \
            --notes "$NOTES" \
            --target "$COMMIT_SHA" \
            --draft \
            "$APK_DIR/bfs-pos.apk" \
            "$APK_DIR/bfs-pos.apk.sha256"

          # Publish draft; set prerelease flag based on environment
          if [ "$IS_PRERELEASE" = "true" ]; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease
          else
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease=false
          fi

      - name: Build summary
        run: |
          echo "## Android Release Created ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ inputs.version }} (build ${{ steps.version.version_code }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** android-${{ inputs.environment }}-v${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **APK:** bfs-pos.apk" >> $GITHUB_STEP_SUMMARY
          echo "- **Prerelease:** ${{ inputs.environment == 'staging' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "APK is available in the [Releases](https://github.com/${{ github.repository }}/releases) page." >> $GITHUB_STEP_SUMMARY
