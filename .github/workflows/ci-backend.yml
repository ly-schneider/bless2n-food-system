name: CI Backend

on:
  workflow_call:

jobs:
  lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-go-env

      - uses: ./.github/actions/generate-backend

      - name: Lint
        working-directory: bfs-backend
        run: go tool golangci-lint run --timeout=3m ./...

  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-go-env

      - uses: ./.github/actions/generate-backend

      - name: Run tests
        working-directory: bfs-backend
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./bfs-backend/coverage.out
          flags: backend
          fail_ci_if_error: false

  migrate-lint:
    name: Migration Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Atlas CLI
        uses: ariga/setup-atlas@2f3c785c89a15e1c0d07bcae3900fb5feb969eea # v0.3

      - name: Validate migration integrity
        working-directory: bfs-backend
        run: atlas migrate validate --dir "file://db/migrations"

      - name: Lint new migrations with squawk
        run: |
          git fetch origin main --depth=1
          NEW_MIGRATIONS=$(git diff --name-only --diff-filter=A origin/main -- bfs-backend/db/migrations/ | grep '\.sql$' || true)
          if [ -z "$NEW_MIGRATIONS" ]; then
            echo "No new migration files to lint"
            exit 0
          fi
          npm install -g squawk-cli
          echo "$NEW_MIGRATIONS" | xargs squawk
