ProductType:
  type: string
  enum: [simple, menu]
  description: |
    - `simple`: Standalone product
    - `menu`: Composite product with menu slots and options

Product:
  type: object
  required: [id, categoryId, type, name, priceCents, isActive]
  properties:
    id:
      type: string
    categoryId:
      type: string
    type:
      $ref: "#/ProductType"
    name:
      type: string
      maxLength: 20
    image:
      type: string
      nullable: true
      description: Image URL
    description:
      type: string
      nullable: true
      maxLength: 500
      description: Optional free-text description shown to customers
    priceCents:
      type: integer
      format: int64
      description: Price in cents (CHF)
    jetonId:
      type: string
      nullable: true
    isActive:
      type: boolean
    # Admin-only fields
    createdAt:
      type: string
      format: date-time
      x-admin-only: true
    updatedAt:
      type: string
      format: date-time
      x-admin-only: true
    stock:
      type: integer
      description: Current inventory level (computed from ledger)
      x-admin-only: true
    # Embedded relations (included in list responses)
    category:
      $ref: "categories.yaml#/CategorySummary"
    jeton:
      $ref: "jetons.yaml#/JetonSummary"
      nullable: true
    menuSlots:
      type: array
      items:
        $ref: "menus.yaml#/MenuSlotSummary"
      description: Only present for menu-type products

ProductCreate:
  type: object
  required: [categoryId, name, priceCents]
  properties:
    categoryId:
      type: string
    type:
      $ref: "#/ProductType"
      default: simple
    name:
      type: string
      maxLength: 20
    image:
      type: string
    description:
      type: string
      maxLength: 500
    priceCents:
      type: integer
      format: int64
      minimum: 0
    jetonId:
      type: string

ProductUpdate:
  type: object
  properties:
    name:
      type: string
      maxLength: 20
    image:
      type: string
      nullable: true
    description:
      type: string
      nullable: true
      maxLength: 500
    priceCents:
      type: integer
      format: int64
      minimum: 0
    isActive:
      type: boolean
    categoryId:
      type: string
    jetonId:
      type: string
      nullable: true

ProductImageResponse:
  type: object
  required: [imageUrl]
  properties:
    imageUrl:
      type: string

ProductList:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: "#/Product"

Inventory:
  type: object
  required: [productId, quantity]
  properties:
    productId:
      type: string
    quantity:
      type: integer
    updatedAt:
      type: string
      format: date-time

InventoryAdjustment:
  type: object
  required: [delta, reason]
  properties:
    delta:
      type: integer
      description: Positive to add, negative to remove
    reason:
      $ref: "#/InventoryReason"

InventoryReason:
  type: string
  enum: [opening_balance, sale, refund, manual_adjust, correction]

InventoryLedgerEntry:
  type: object
  required: [id, productId, delta, reason, createdAt]
  properties:
    id:
      type: string
    productId:
      type: string
    delta:
      type: integer
    reason:
      $ref: "#/InventoryReason"
    createdAt:
      type: string
      format: date-time
    orderId:
      type: string
      nullable: true
    orderLineId:
      type: string
      nullable: true
    deviceId:
      type: string
      nullable: true
    createdBy:
      type: string
      nullable: true

InventoryLedgerList:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: "#/InventoryLedgerEntry"
