Event:
  type: object
  required: [year, month, day, orderCount]
  properties:
    year:
      type: integer
    month:
      type: integer
      minimum: 1
      maximum: 12
    day:
      type: integer
      minimum: 1
      maximum: 31
    orderCount:
      type: integer

EventList:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: "#/Event"
